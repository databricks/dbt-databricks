version: 2
updates:
  # Python dependencies — security updates only
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    rebase-strategy: "disabled"

  # GitHub Actions — security updates only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    rebase-strategy: "disabled"
