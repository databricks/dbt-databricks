# SPOG Integration Tests for dbt-databricks.
# Runs the full UC-SQL-endpoint functional matrix against the SPOG vanity
# host so every code path is exercised under SPOG routing.
name: SPOG Integration Tests
on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * 0"  # Weekly: Sunday 21:30 UTC (Monday 03:00 IST).
  # Temporary: fire on push to the SPOG dev branch so we can validate the
  # workflow end-to-end before merge. Drop this block when the PR lands —
  # workflow_dispatch + schedule will be enough once the file is on main.
  push:
    branches:
      - sd-db/spog-impl

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spog-uc-sql-endpoint:
    name: SPOG UC SQL Endpoint Functional Tests
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 90
    environment: azure-prod
    env:
      UV_FROZEN: "1"
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.TEST_PECO_SPOG_HOST }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.TEST_PECO_WAREHOUSE_HTTP_PATH }}?o=${{ secrets.TEST_PECO_SPOG_WORKSPACE_ID }}
      DBT_DATABRICKS_CLIENT_ID: ${{ secrets.TEST_PECO_SP_ID }}
      DBT_DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_PECO_SP_SECRET }}
      DBT_DATABRICKS_UC_INITIAL_CATALOG: peco
      DBT_DATABRICKS_LOCATION_ROOT: ${{ secrets.TEST_PECO_EXTERNAL_LOCATION }}test
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup JFrog PyPI Proxy
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Run UC SQL endpoint functional tests against SPOG
        run: |
          mkdir -p logs
          DBT_TEST_USER=notnecessaryformosttests@example.com \
            hatch run pytest tests/functional \
            --color=yes -v \
            --profile databricks_uc_sql_endpoint \
            -n 10 --dist=loadfile \
            --reruns 1 --reruns-delay 60 \
            --junitxml=logs/junit-spog.xml

      - name: Upload SPOG Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: spog-test-logs
          path: logs/
          retention-days: 14
