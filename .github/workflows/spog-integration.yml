# SPOG Integration Tests for dbt-databricks.
# A full SPOG mirror of the functional matrix is a possible future expansion.
name: SPOG Integration Tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 6"  # Weekly: Saturday 22:00 UTC.

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spog-integration:
    name: SPOG Functional Tests
    runs-on: ubuntu-latest
    env:
      # The SPOG host (and SPOG-flavored http_path with ?o=<workspace-id>) come
      # from SPOG-specific secrets, but we plug them into the standard env var
      # names so the same profile machinery the rest of the tests use applies.
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.DBT_DATABRICKS_SPOG_HOST_NAME }}
      DBT_DATABRICKS_UC_ENDPOINT_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_SPOG_HTTP_PATH }}
      DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}
      DBT_DATABRICKS_UC_INITIAL_CATALOG: ${{ secrets.DBT_DATABRICKS_UC_INITIAL_CATALOG }}
      DBT_DATABRICKS_UC_INITIAL_SCHEMA: ${{ secrets.DBT_DATABRICKS_UC_INITIAL_SCHEMA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Run SPOG-specific functional tests
        run: |
          mkdir -p logs
          hatch run pytest tests/functional/adapter/spog \
            --color=yes -v \
            --profile databricks_uc_sql_endpoint \
            --junitxml=logs/junit-spog.xml

      - name: Upload SPOG Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: spog-test-logs
          path: logs/
          retention-days: 14
