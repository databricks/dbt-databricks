# Fails when pyproject.toml changed without re-running
# scripts/regenerate_min_deps_lock.sh. Fires on push to main / *.latest
# (always) and on internal PRs (early signal); fork PRs are skipped
# at the job level because they cannot mint the JFrog OIDC token the
# protected runner needs.

name: Min-Deps Lock Drift Check

on:
  push:
    branches:
      - "main"
      - "*.latest"
    paths:
      - "pyproject.toml"
      - "requirements.lowest-direct.txt"
      - "scripts/regenerate_min_deps_lock.sh"
      - ".github/workflows/min-deps-lock-drift.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements.lowest-direct.txt"
      - "scripts/regenerate_min_deps_lock.sh"
      - ".github/workflows/min-deps-lock-drift.yml"

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  drift-check:
    name: lock matches pyproject.toml
    # Fork PRs cannot mint the JFrog OIDC token; skip them on pull_request.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup JFrog PyPI Proxy
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Regenerate lock
        run: scripts/regenerate_min_deps_lock.sh

      - name: Fail if lock drifted
        run: |
          if ! git diff --exit-code requirements.lowest-direct.txt; then
            echo
            echo "ERROR: requirements.lowest-direct.txt is out of sync with pyproject.toml."
            echo "Run 'scripts/regenerate_min_deps_lock.sh' locally and commit the result."
            exit 1
          fi
