    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    environment: azure-prod
    env:
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.DATABRICKS_HOST }}
      DBT_DATABRICKS_CLIENT_ID: ${{ secrets.TEST_PECO_SP_ID }}
      DBT_DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_PECO_SP_SECRET }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.TEST_PECO_WAREHOUSE_HTTP_PATH }}
      DBT_DATABRICKS_UC_INITIAL_CATALOG: peco
      DBT_DATABRICKS_LOCATION_ROOT: ${{ secrets.TEST_PECO_EXTERNAL_LOCATION }}test
      TEST_PECO_UC_CLUSTER_ID: ${{ secrets.TEST_PECO_UC_CLUSTER_ID }}
      UV_FROZEN: "1"
      DBT_DATABRICKS_HTTP_TRACE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Start runner metrics sampler
        run: |
          mkdir -p logs
          NETIF=$(ip route show default | awk '/default/ {print $5; exit}')
          [ -z "$NETIF" ] && NETIF=eth0
          (
            echo -e "ts\tload1\tload5\tload15\tmem_avail_kb\tmem_total_kb\tcpu_user\tcpu_nice\tcpu_system\tcpu_idle\tcpu_iowait\tcpu_irq\tcpu_softirq\tcpu_steal\trx_bytes\ttx_bytes"
            while true; do
              ts=$(date -u +%s)
              read load1 load5 load15 _ _ < /proc/loadavg
              cpu=$(awk 'NR==1{printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s",$2,$3,$4,$5,$6,$7,$8,$9}' /proc/stat)
              mem=$(awk '/^MemAvailable:/{ma=$2} /^MemTotal:/{mt=$2} END {printf "%s\t%s",ma,mt}' /proc/meminfo)
              net=$(awk -v ifc="$NETIF:" '$1==ifc{printf "%s\t%s",$2,$10}' /proc/net/dev)
              [ -z "$net" ] && net="0	0"
              printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\n" "$ts" "$load1" "$load5" "$load15" "$mem" "$cpu" "$net"
              sleep 5
            done
          ) > logs/runner-metrics.tsv 2>&1 &
          echo $! > /tmp/sampler.pid
          disown

      - name: Setup Python Dependencies
        id: deps
        uses: ./.github/actions/setup-python-deps

      - name: Setup JFrog PyPI Proxy (fallback)
        if: steps.deps.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Get http path from environment
        run: python .github/workflows/build_cluster_http_path.py
        shell: sh

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        id: install-dependencies
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Run Sql Endpoint Functional Tests
        run: DBT_TEST_USER=notnecessaryformosttests@example.com DBT_DATABRICKS_LOCATION_ROOT=$DBT_DATABRICKS_LOCATION_ROOT DBT_DATABRICKS_HOST_NAME=$DBT_DATABRICKS_HOST_NAME DBT_DATABRICKS_UC_CLUSTER_HTTP_PATH=$DBT_DATABRICKS_UC_CLUSTER_HTTP_PATH DBT_DATABRICKS_CLIENT_ID=$DBT_DATABRICKS_CLIENT_ID DBT_DATABRICKS_CLIENT_SECRET=$DBT_DATABRICKS_CLIENT_SECRET hatch -v run sqlw-e2e

      - name: Stop runner metrics sampler
        if: always()
        run: |
          if [ -f /tmp/sampler.pid ]; then
            kill "$(cat /tmp/sampler.pid)" 2>/dev/null || true
          fi

      - name: Upload SQL Endpoint Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sql-endpoint-test-logs-${{ matrix.target.pr }}
          path: logs/
          retention-days: 5

  run-cluster-e2e-tests:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    environment: azure-prod
    env:
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.DATABRICKS_HOST }}
      DBT_DATABRICKS_CLIENT_ID: ${{ secrets.TEST_PECO_SP_ID }}
      DBT_DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_PECO_SP_SECRET }}
      TEST_PECO_CLUSTER_ID: ${{ secrets.TEST_PECO_CLUSTER_ID }}
      DBT_DATABRICKS_LOCATION_ROOT: ${{ secrets.TEST_PECO_EXTERNAL_LOCATION }}test
      UV_FROZEN: "1"
      DBT_DATABRICKS_HTTP_TRACE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Start runner metrics sampler
        run: |
          mkdir -p logs
          NETIF=$(ip route show default | awk '/default/ {print $5; exit}')
          [ -z "$NETIF" ] && NETIF=eth0
          (
            echo -e "ts\tload1\tload5\tload15\tmem_avail_kb\tmem_total_kb\tcpu_user\tcpu_nice\tcpu_system\tcpu_idle\tcpu_iowait\tcpu_irq\tcpu_softirq\tcpu_steal\trx_bytes\ttx_bytes"
            while true; do
              ts=$(date -u +%s)
              read load1 load5 load15 _ _ < /proc/loadavg
              cpu=$(awk 'NR==1{printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s",$2,$3,$4,$5,$6,$7,$8,$9}' /proc/stat)
              mem=$(awk '/^MemAvailable:/{ma=$2} /^MemTotal:/{mt=$2} END {printf "%s\t%s",ma,mt}' /proc/meminfo)
              net=$(awk -v ifc="$NETIF:" '$1==ifc{printf "%s\t%s",$2,$10}' /proc/net/dev)
              [ -z "$net" ] && net="0	0"
              printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\n" "$ts" "$load1" "$load5" "$load15" "$mem" "$cpu" "$net"
              sleep 5
            done
          ) > logs/runner-metrics.tsv 2>&1 &
