# Integration Tests for dbt-databricks
#
# This workflow runs integration tests that require Databricks secrets. It is
# never triggered by PR events directly — every PR-based run is the result of
# a maintainer's explicit decision.
#
# Triggering:
# 1. On a PR (internal OR fork): a maintainer comments `/integration-test`.
#    The integration-trigger workflow validates the comment author and
#    dispatches this workflow with the PR number. The run posts a result
#    comment back to the PR when the matrix completes.
# 2. Manually from the Actions tab (workflow_dispatch):
#    - One PR (e.g. "100") OR comma-separated list ("100,200,300") in pr_numbers.
#    - Or a git_ref for ad-hoc testing.
# 3. Nightly on `main` at 03:00 IST (21:30 UTC). The `prepare` job short-circuits
#    if the current main SHA has already had a successful integration run,
#    emitting an empty targets array so the matrix jobs skip cleanly.
#
# Security: PR-triggered runs are gated on maintainer comment authorization;
# fork-PR code runs in the main repo context (access to secrets) only because
# a maintainer explicitly approved it via the slash command.
name: Integration Tests
on:
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: "PR number(s) to test — single PR or comma-separated for batch (e.g. '100' or '100,200,300')"
        required: false
        type: string
      git_ref:
        description: "Git ref (branch/tag/commit) to test — used only when pr_numbers is empty"
        required: false
        type: string

  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC = 03:00 IST

permissions:
  id-token: write
  contents: read

# Target-aware concurrency:
# - Different PRs / batches don't cancel each other.
# - Re-dispatch of the same PR / batch cancels the stale run.
# - Schedule runs share the main-ref group.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.pr_numbers || github.event.inputs.git_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    outputs:
      targets: ${{ steps.parse.outputs.targets }}
    steps:
      - name: Parse targets
        id: parse
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBERS: ${{ github.event.inputs.pr_numbers }}
          INPUT_GIT_REF: ${{ github.event.inputs.git_ref }}
          DEFAULT_REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          entry() { printf '{"pr":"%s","ref":"%s"}' "$1" "$2"; }
          targets="["
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            # Nightly skip-if-unchanged: if this main SHA already has a green
            # integration run, emit empty targets so the matrix jobs skip.
            already_tested=$(curl -sfS \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/integration.yml/runs?branch=main&status=success&head_sha=$GITHUB_SHA" \
              | jq -r '.total_count // 0')
            if [[ "$already_tested" -gt 0 ]]; then
              echo "Nightly skip: main @ $GITHUB_SHA already has $already_tested successful run(s)."
            else
              targets+=$(entry "nightly" "$DEFAULT_REF")
            fi
          elif [[ -n "${INPUT_PR_NUMBERS//[[:space:]]/}" ]]; then
            first=1
            IFS=',' read -ra prs <<< "$INPUT_PR_NUMBERS"
            for pr in "${prs[@]}"; do
              pr_trimmed="${pr//[[:space:]]/}"
              [[ -z "$pr_trimmed" ]] && continue
              if [[ ! "$pr_trimmed" =~ ^[0-9]+$ ]]; then
                echo "::error::Invalid PR number '$pr_trimmed' in pr_numbers='$INPUT_PR_NUMBERS' — expected digits, comma-separated."
                exit 1
              fi
              [[ $first -eq 0 ]] && targets+=","
              first=0
              targets+=$(entry "$pr_trimmed" "refs/pull/$pr_trimmed/head")
            done
          elif [[ -n "${INPUT_GIT_REF//[[:space:]]/}" ]]; then
            targets+=$(entry "manual" "$INPUT_GIT_REF")
          else
            targets+=$(entry "manual" "$DEFAULT_REF")
          fi
          targets+="]"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Parsed targets: $targets"

  # Collects pytest test ids per profile and assigns them to N shards via
  # scripts/shard_assign.py. Uploads `shard-assignments-{pr}` artifact that
  # the sharded test jobs (uc-cluster, sqlwarehouse) and the gather job
  # consume. Collection does not need workspace credentials — pytest's
  # `--collect-only` imports test modules but never invokes the
  # `dbt_profile_target` fixture.
  prepare-shards:
    needs: prepare
    if: needs.prepare.outputs.targets != '[]'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    env:
      UV_FROZEN: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Setup Python Dependencies
        id: deps
        uses: ./.github/actions/setup-python-deps

      - name: Setup JFrog PyPI Proxy (fallback)
        if: steps.deps.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        id: install-dependencies
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Collect tests and assign to shards
        run: |
          set -euo pipefail
          mkdir -p shard-assignments
          for PROFILE in databricks_uc_cluster databricks_uc_sql_endpoint; do
            echo "::group::Collecting tests for $PROFILE"
            hatch run pytest --collect-only -q --profile "$PROFILE" tests/functional 2>&1 \
              | grep "::" \
              > "shard-assignments/${PROFILE}-collected.txt"
            echo "::endgroup::"
            python3 scripts/shard_assign.py \
              --profile "$PROFILE" \
              --num-shards 2 \
              --input "shard-assignments/${PROFILE}-collected.txt" \
              --output-dir shard-assignments
          done

      - name: Upload shard assignments
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: shard-assignments-${{ matrix.target.pr }}
          path: shard-assignments/
          retention-days: 5

  run-uc-cluster-e2e-tests:
    # Do not add `if: always()` / `if: !cancelled()` here or on sibling test jobs —
    # `needs: prepare` propagates the external-fork skip cleanly, and forcing
    # evaluation would make `fromJSON(needs.prepare.outputs.targets)` fail on an
    # empty output. Matrix shape contract: {pr, ref, shard} — defined in the
    # `prepare` job (pr+ref) plus the static `shard` dimension below.
    needs:
      - prepare
      - prepare-shards
    strategy:
      fail-fast: false
      # 2 PRs × 2 shards = 4 cells; allow them to run concurrently.
      max-parallel: 4
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
        shard: [0, 1]
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    environment: azure-prod
    env:
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.DATABRICKS_HOST }}
      DBT_DATABRICKS_CLIENT_ID: ${{ secrets.TEST_PECO_SP_ID }}
      DBT_DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_PECO_SP_SECRET }}
      DBT_DATABRICKS_UC_INITIAL_CATALOG: peco
      DBT_DATABRICKS_LOCATION_ROOT: ${{ secrets.TEST_PECO_EXTERNAL_LOCATION }}test
      TEST_PECO_UC_CLUSTER_ID: ${{ secrets.TEST_PECO_UC_CLUSTER_ID }}
      UV_FROZEN: "1"
      DBT_DATABRICKS_HTTP_TRACE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Start runner metrics sampler
        run: |
          mkdir -p logs
          # One-time system snapshot. Captures nproc, CPU model, memory total,
          # kernel, OS release, network routes, ulimits, and runner identity so
          # later analysis doesn't have to infer core count from jiffy rate.
          {
            echo "=== uname -a ==="; uname -a
            echo "=== nproc ==="; nproc
            echo "=== /proc/cpuinfo (first ~50 lines) ==="; head -50 /proc/cpuinfo
            echo "=== /proc/meminfo (first 5 lines) ==="; head -5 /proc/meminfo
            echo "=== /etc/os-release ==="; cat /etc/os-release
            echo "=== ip route ==="; ip route show
            echo "=== ulimit -a ==="; ulimit -a
            echo "=== runner identity ==="
            echo "RUNNER_NAME=${RUNNER_NAME:-}"
            echo "RUNNER_OS=${RUNNER_OS:-}"
            echo "RUNNER_ARCH=${RUNNER_ARCH:-}"
            echo "GITHUB_RUN_ID=${GITHUB_RUN_ID:-}"
            echo "GITHUB_JOB=${GITHUB_JOB:-}"
            echo "HOSTNAME=$(hostname)"
            echo "DATE_UTC=$(date -u --iso-8601=seconds)"
          } > logs/runner-info.txt 2>&1

          NCORES=$(nproc)
          NETIF=$(ip route show default | awk '/default/ {print $5; exit}')
          [ -z "$NETIF" ] && NETIF=eth0

          # Sampler. /proc/stat aggregate is the first line ("cpu ..."); per-CPU
          # are subsequent "cpu0 ...", "cpu1 ..." lines. We capture the aggregate
          # plus all per-core lines as a JSON-array column so we don't have to
          # commit to a fixed number of cores in the schema.
          (
            echo -e "ts\tload1\tload5\tload15\tmem_avail_kb\tmem_total_kb\tcpu_user\tcpu_nice\tcpu_system\tcpu_idle\tcpu_iowait\tcpu_irq\tcpu_softirq\tcpu_steal\tprocs_running\tprocs_blocked\trx_bytes\ttx_bytes\tper_cpu_busy_idle"
            while true; do
              ts=$(date -u +%s)
              read load1 load5 load15 _ _ < /proc/loadavg
              cpu=$(awk 'NR==1{printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s",$2,$3,$4,$5,$6,$7,$8,$9}' /proc/stat)
              # procs_running, procs_blocked from /proc/stat tail
              procs=$(awk '/^procs_running/{r=$2} /^procs_blocked/{b=$2} END{printf "%s\t%s", r, b}' /proc/stat)
              mem=$(awk '/^MemAvailable:/{ma=$2} /^MemTotal:/{mt=$2} END {printf "%s\t%s",ma,mt}' /proc/meminfo)
              net=$(awk -v ifc="$NETIF:" '$1==ifc{printf "%s\t%s",$2,$10}' /proc/net/dev)
              [ -z "$net" ] && net="0	0"
              # Per-CPU: emit a compact "cpu0:busy:idle;cpu1:busy:idle;..." string.
              percpu=$(awk '
                /^cpu[0-9]+ / {
                  busy = $2 + $3 + $4 + $6 + $7 + $8 + $9
                  idle = $5
                  printf "%s%s:%d:%d", sep, $1, busy, idle
                  sep = ";"
                }
              ' /proc/stat)
              printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n" "$ts" "$load1" "$load5" "$load15" "$mem" "$cpu" "$procs" "$net" "$percpu"
              sleep 5
            done
          ) > logs/runner-metrics.tsv 2>&1 &
          echo $! > /tmp/sampler.pid
          disown

      - name: Setup Python Dependencies
        id: deps
        uses: ./.github/actions/setup-python-deps

      - name: Setup JFrog PyPI Proxy (fallback)
        if: steps.deps.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Get http path from environment
        run: python .github/workflows/build_cluster_http_path.py
        shell: sh

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        id: install-dependencies
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Download shard assignments
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e  # v4.1.7
        with:
          name: shard-assignments-${{ matrix.target.pr }}
          path: shard-assignments/

      - name: Resolve test list for this shard
        run: |
          set -euo pipefail
          SHARD_FILE="shard-assignments/databricks_uc_cluster-shard-${{ matrix.shard }}.txt"
          if [ ! -s "$SHARD_FILE" ]; then
            echo "::error::Shard file missing or empty: $SHARD_FILE"
            exit 1
          fi
          echo "SHARD_TESTS_FILE=$SHARD_FILE" >> "$GITHUB_ENV"
          echo "Tests in shard ${{ matrix.shard }}: $(wc -l < "$SHARD_FILE")"

      - name: Run UC Cluster Functional Tests (shard ${{ matrix.shard }})
        run: |
          mkdir -p logs
          DBT_TEST_USER=notnecessaryformosttests@example.com \
          DBT_DATABRICKS_LOCATION_ROOT="$DBT_DATABRICKS_LOCATION_ROOT" \
          DBT_DATABRICKS_HOST_NAME="$DBT_DATABRICKS_HOST_NAME" \
          DBT_DATABRICKS_UC_CLUSTER_HTTP_PATH="$DBT_DATABRICKS_UC_CLUSTER_HTTP_PATH" \
          DBT_DATABRICKS_CLIENT_ID="$DBT_DATABRICKS_CLIENT_ID" \
          DBT_DATABRICKS_CLIENT_SECRET="$DBT_DATABRICKS_CLIENT_SECRET" \
          xargs -r hatch -v run pytest \
            --color=yes -v \
            --profile databricks_uc_cluster \
            -n 10 --dist=loadfile \
            --junitxml=logs/junit-shard-${{ matrix.shard }}.xml \
            < "$SHARD_TESTS_FILE"

      - name: Stop runner metrics sampler
        if: always()
        run: |
          if [ -f /tmp/sampler.pid ]; then
            kill "$(cat /tmp/sampler.pid)" 2>/dev/null || true
          fi

      - name: Upload UC Cluster Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: uc-cluster-test-logs-${{ matrix.target.pr }}-shard-${{ matrix.shard }}
          path: logs/
          retention-days: 5

  run-sqlwarehouse-e2e-tests:
    # Matrix shape contract: {pr, ref, shard} — pr+ref from `prepare`, shard
    # is the static dimension below.
    needs:
      - prepare
      - prepare-shards
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
        shard: [0, 1]
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    environment: azure-prod
    env:
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.DATABRICKS_HOST }}
      DBT_DATABRICKS_CLIENT_ID: ${{ secrets.TEST_PECO_SP_ID }}
      DBT_DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_PECO_SP_SECRET }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.TEST_PECO_WAREHOUSE_HTTP_PATH }}
      DBT_DATABRICKS_UC_INITIAL_CATALOG: peco
      DBT_DATABRICKS_LOCATION_ROOT: ${{ secrets.TEST_PECO_EXTERNAL_LOCATION }}test
      TEST_PECO_UC_CLUSTER_ID: ${{ secrets.TEST_PECO_UC_CLUSTER_ID }}
      UV_FROZEN: "1"
      DBT_DATABRICKS_HTTP_TRACE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Start runner metrics sampler
        run: |
          mkdir -p logs
          # One-time system snapshot. Captures nproc, CPU model, memory total,
          # kernel, OS release, network routes, ulimits, and runner identity so
          # later analysis doesn't have to infer core count from jiffy rate.
          {
            echo "=== uname -a ==="; uname -a
            echo "=== nproc ==="; nproc
            echo "=== /proc/cpuinfo (first ~50 lines) ==="; head -50 /proc/cpuinfo
            echo "=== /proc/meminfo (first 5 lines) ==="; head -5 /proc/meminfo
            echo "=== /etc/os-release ==="; cat /etc/os-release
            echo "=== ip route ==="; ip route show
            echo "=== ulimit -a ==="; ulimit -a
            echo "=== runner identity ==="
            echo "RUNNER_NAME=${RUNNER_NAME:-}"
            echo "RUNNER_OS=${RUNNER_OS:-}"
            echo "RUNNER_ARCH=${RUNNER_ARCH:-}"
            echo "GITHUB_RUN_ID=${GITHUB_RUN_ID:-}"
            echo "GITHUB_JOB=${GITHUB_JOB:-}"
            echo "HOSTNAME=$(hostname)"
            echo "DATE_UTC=$(date -u --iso-8601=seconds)"
          } > logs/runner-info.txt 2>&1

          NCORES=$(nproc)
          NETIF=$(ip route show default | awk '/default/ {print $5; exit}')
          [ -z "$NETIF" ] && NETIF=eth0

          # Sampler. /proc/stat aggregate is the first line ("cpu ..."); per-CPU
          # are subsequent "cpu0 ...", "cpu1 ..." lines. We capture the aggregate
          # plus all per-core lines as a JSON-array column so we don't have to
          # commit to a fixed number of cores in the schema.
          (
            echo -e "ts\tload1\tload5\tload15\tmem_avail_kb\tmem_total_kb\tcpu_user\tcpu_nice\tcpu_system\tcpu_idle\tcpu_iowait\tcpu_irq\tcpu_softirq\tcpu_steal\tprocs_running\tprocs_blocked\trx_bytes\ttx_bytes\tper_cpu_busy_idle"
            while true; do
              ts=$(date -u +%s)
              read load1 load5 load15 _ _ < /proc/loadavg
              cpu=$(awk 'NR==1{printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s",$2,$3,$4,$5,$6,$7,$8,$9}' /proc/stat)
              # procs_running, procs_blocked from /proc/stat tail
              procs=$(awk '/^procs_running/{r=$2} /^procs_blocked/{b=$2} END{printf "%s\t%s", r, b}' /proc/stat)
              mem=$(awk '/^MemAvailable:/{ma=$2} /^MemTotal:/{mt=$2} END {printf "%s\t%s",ma,mt}' /proc/meminfo)
              net=$(awk -v ifc="$NETIF:" '$1==ifc{printf "%s\t%s",$2,$10}' /proc/net/dev)
              [ -z "$net" ] && net="0	0"
              # Per-CPU: emit a compact "cpu0:busy:idle;cpu1:busy:idle;..." string.
              percpu=$(awk '
                /^cpu[0-9]+ / {
                  busy = $2 + $3 + $4 + $6 + $7 + $8 + $9
                  idle = $5
                  printf "%s%s:%d:%d", sep, $1, busy, idle
                  sep = ";"
                }
              ' /proc/stat)
              printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n" "$ts" "$load1" "$load5" "$load15" "$mem" "$cpu" "$procs" "$net" "$percpu"
              sleep 5
            done
          ) > logs/runner-metrics.tsv 2>&1 &
          echo $! > /tmp/sampler.pid
          disown

      - name: Setup Python Dependencies
        id: deps
        uses: ./.github/actions/setup-python-deps

      - name: Setup JFrog PyPI Proxy (fallback)
        if: steps.deps.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Get http path from environment
        run: python .github/workflows/build_cluster_http_path.py
        shell: sh

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        id: install-dependencies
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Download shard assignments
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e  # v4.1.7
        with:
          name: shard-assignments-${{ matrix.target.pr }}
          path: shard-assignments/

      - name: Resolve test list for this shard
        run: |
          set -euo pipefail
          SHARD_FILE="shard-assignments/databricks_uc_sql_endpoint-shard-${{ matrix.shard }}.txt"
          if [ ! -s "$SHARD_FILE" ]; then
            echo "::error::Shard file missing or empty: $SHARD_FILE"
            exit 1
          fi
          echo "SHARD_TESTS_FILE=$SHARD_FILE" >> "$GITHUB_ENV"
          echo "Tests in shard ${{ matrix.shard }}: $(wc -l < "$SHARD_FILE")"

      - name: Run Sql Endpoint Functional Tests (shard ${{ matrix.shard }})
        run: |
          mkdir -p logs
          DBT_TEST_USER=notnecessaryformosttests@example.com \
          DBT_DATABRICKS_LOCATION_ROOT="$DBT_DATABRICKS_LOCATION_ROOT" \
          DBT_DATABRICKS_HOST_NAME="$DBT_DATABRICKS_HOST_NAME" \
          DBT_DATABRICKS_UC_CLUSTER_HTTP_PATH="$DBT_DATABRICKS_UC_CLUSTER_HTTP_PATH" \
          DBT_DATABRICKS_CLIENT_ID="$DBT_DATABRICKS_CLIENT_ID" \
          DBT_DATABRICKS_CLIENT_SECRET="$DBT_DATABRICKS_CLIENT_SECRET" \
          xargs -r hatch -v run pytest \
            --color=yes -v \
            --profile databricks_uc_sql_endpoint \
            -n 10 --dist=loadfile \
            --junitxml=logs/junit-shard-${{ matrix.shard }}.xml \
            < "$SHARD_TESTS_FILE"

      - name: Stop runner metrics sampler
        if: always()
        run: |
          if [ -f /tmp/sampler.pid ]; then
            kill "$(cat /tmp/sampler.pid)" 2>/dev/null || true
          fi

      - name: Upload SQL Endpoint Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sql-endpoint-test-logs-${{ matrix.target.pr }}-shard-${{ matrix.shard }}
          path: logs/
          retention-days: 5

  run-cluster-e2e-tests:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    environment: azure-prod
    env:
      DBT_DATABRICKS_HOST_NAME: ${{ secrets.DATABRICKS_HOST }}
      DBT_DATABRICKS_CLIENT_ID: ${{ secrets.TEST_PECO_SP_ID }}
      DBT_DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_PECO_SP_SECRET }}
      TEST_PECO_CLUSTER_ID: ${{ secrets.TEST_PECO_CLUSTER_ID }}
      DBT_DATABRICKS_LOCATION_ROOT: ${{ secrets.TEST_PECO_EXTERNAL_LOCATION }}test
      UV_FROZEN: "1"
      DBT_DATABRICKS_HTTP_TRACE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Start runner metrics sampler
        run: |
          mkdir -p logs
          # One-time system snapshot. Captures nproc, CPU model, memory total,
          # kernel, OS release, network routes, ulimits, and runner identity so
          # later analysis doesn't have to infer core count from jiffy rate.
          {
            echo "=== uname -a ==="; uname -a
            echo "=== nproc ==="; nproc
            echo "=== /proc/cpuinfo (first ~50 lines) ==="; head -50 /proc/cpuinfo
            echo "=== /proc/meminfo (first 5 lines) ==="; head -5 /proc/meminfo
            echo "=== /etc/os-release ==="; cat /etc/os-release
            echo "=== ip route ==="; ip route show
            echo "=== ulimit -a ==="; ulimit -a
            echo "=== runner identity ==="
            echo "RUNNER_NAME=${RUNNER_NAME:-}"
            echo "RUNNER_OS=${RUNNER_OS:-}"
            echo "RUNNER_ARCH=${RUNNER_ARCH:-}"
            echo "GITHUB_RUN_ID=${GITHUB_RUN_ID:-}"
            echo "GITHUB_JOB=${GITHUB_JOB:-}"
            echo "HOSTNAME=$(hostname)"
            echo "DATE_UTC=$(date -u --iso-8601=seconds)"
          } > logs/runner-info.txt 2>&1

          NCORES=$(nproc)
          NETIF=$(ip route show default | awk '/default/ {print $5; exit}')
          [ -z "$NETIF" ] && NETIF=eth0

          # Sampler. /proc/stat aggregate is the first line ("cpu ..."); per-CPU
          # are subsequent "cpu0 ...", "cpu1 ..." lines. We capture the aggregate
          # plus all per-core lines as a JSON-array column so we don't have to
          # commit to a fixed number of cores in the schema.
          (
            echo -e "ts\tload1\tload5\tload15\tmem_avail_kb\tmem_total_kb\tcpu_user\tcpu_nice\tcpu_system\tcpu_idle\tcpu_iowait\tcpu_irq\tcpu_softirq\tcpu_steal\tprocs_running\tprocs_blocked\trx_bytes\ttx_bytes\tper_cpu_busy_idle"
            while true; do
              ts=$(date -u +%s)
              read load1 load5 load15 _ _ < /proc/loadavg
              cpu=$(awk 'NR==1{printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s",$2,$3,$4,$5,$6,$7,$8,$9}' /proc/stat)
              # procs_running, procs_blocked from /proc/stat tail
              procs=$(awk '/^procs_running/{r=$2} /^procs_blocked/{b=$2} END{printf "%s\t%s", r, b}' /proc/stat)
              mem=$(awk '/^MemAvailable:/{ma=$2} /^MemTotal:/{mt=$2} END {printf "%s\t%s",ma,mt}' /proc/meminfo)
              net=$(awk -v ifc="$NETIF:" '$1==ifc{printf "%s\t%s",$2,$10}' /proc/net/dev)
              [ -z "$net" ] && net="0	0"
              # Per-CPU: emit a compact "cpu0:busy:idle;cpu1:busy:idle;..." string.
              percpu=$(awk '
                /^cpu[0-9]+ / {
                  busy = $2 + $3 + $4 + $6 + $7 + $8 + $9
                  idle = $5
                  printf "%s%s:%d:%d", sep, $1, busy, idle
                  sep = ";"
                }
              ' /proc/stat)
              printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n" "$ts" "$load1" "$load5" "$load15" "$mem" "$cpu" "$procs" "$net" "$percpu"
              sleep 5
            done
          ) > logs/runner-metrics.tsv 2>&1 &
          echo $! > /tmp/sampler.pid
          disown

      - name: Setup Python Dependencies
        id: deps
        uses: ./.github/actions/setup-python-deps

      - name: Setup JFrog PyPI Proxy (fallback)
        if: steps.deps.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Get http path from environment
        run: python .github/workflows/build_cluster_http_path.py
        shell: sh

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        id: install-dependencies
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install

      - name: Run Cluster Functional Tests
        run: DBT_TEST_USER=notnecessaryformosttests@example.com DBT_DATABRICKS_LOCATION_ROOT=$DBT_DATABRICKS_LOCATION_ROOT DBT_DATABRICKS_HOST_NAME=$DBT_DATABRICKS_HOST_NAME DBT_DATABRICKS_HTTP_PATH=$DBT_DATABRICKS_CLUSTER_HTTP_PATH DBT_DATABRICKS_CLIENT_ID=$DBT_DATABRICKS_CLIENT_ID DBT_DATABRICKS_CLIENT_SECRET=$DBT_DATABRICKS_CLIENT_SECRET hatch -v run cluster-e2e

      - name: Stop runner metrics sampler
        if: always()
        run: |
          if [ -f /tmp/sampler.pid ]; then
            kill "$(cat /tmp/sampler.pid)" 2>/dev/null || true
          fi

      - name: Upload Cluster Test Logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: cluster-test-logs-${{ matrix.target.pr }}
          path: logs/
          retention-days: 5

  # Verifies that every test assigned by `prepare-shards` was executed exactly
  # once across the shards (sanity check on the assignment + execution
  # pipeline). Pulls each shard's junit XML from the `*-test-logs-*` artifacts
  # and the manifests from `shard-assignments-*`. Fails the gather job if any
  # invariant fails — this is the canary for a silent shard-assignment bug.
  gather-shards:
    needs:
      - prepare-shards
      - run-uc-cluster-e2e-tests
      - run-sqlwarehouse-e2e-tests
    if: |
      always() &&
      needs.prepare-shards.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ matrix.target.ref }}

      - name: Set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Download shard assignments
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e  # v4.1.7
        with:
          name: shard-assignments-${{ matrix.target.pr }}
          path: shard-assignments/

      - name: Download per-shard test logs
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e  # v4.1.7
        with:
          pattern: "*-test-logs-${{ matrix.target.pr }}-shard-*"
          path: shard-logs/
          merge-multiple: false

      - name: Verify shards
        run: |
          set -euo pipefail
          # Layout after download-artifact (merge-multiple: false):
          #   shard-logs/<artifact-name>/<files...>
          # We need junit-shard-N.xml grouped by profile. Stage them.
          mkdir -p junit/uc-cluster junit/sqlw

          for d in shard-logs/uc-cluster-test-logs-${{ matrix.target.pr }}-shard-*; do
            [ -d "$d" ] || continue
            shard=$(basename "$d" | sed -E 's/.*-shard-([0-9]+)$/\1/')
            cp "$d/junit-shard-${shard}.xml" "junit/uc-cluster/junit-shard-${shard}.xml"
          done
          for d in shard-logs/sql-endpoint-test-logs-${{ matrix.target.pr }}-shard-*; do
            [ -d "$d" ] || continue
            shard=$(basename "$d" | sed -E 's/.*-shard-([0-9]+)$/\1/')
            cp "$d/junit-shard-${shard}.xml" "junit/sqlw/junit-shard-${shard}.xml"
          done

          ANY_FAIL=0
          echo "::group::Verify uc-cluster shards"
          python3 scripts/shard_verify.py \
            --manifest shard-assignments/databricks_uc_cluster-manifest.json \
            --shard-dir shard-assignments \
            --junit-dir junit/uc-cluster || ANY_FAIL=1
          echo "::endgroup::"

          echo "::group::Verify sqlw shards"
          python3 scripts/shard_verify.py \
            --manifest shard-assignments/databricks_uc_sql_endpoint-manifest.json \
            --shard-dir shard-assignments \
            --junit-dir junit/sqlw || ANY_FAIL=1
          echo "::endgroup::"

          if [ "$ANY_FAIL" -ne 0 ]; then
            echo "::error::One or more shard-verification invariants failed."
            exit 1
          fi

  # Posts a per-job pass/fail summary comment back to the PR when dispatched
  # with a single PR number (the slash-command path). Skipped for batch
  # dispatches (pr_numbers contains a comma) and for schedule / git_ref runs.
  # Matrix jobs' result fields are aggregated across cells, which is why this
  # only runs for single-PR dispatches.
  report-status:
    needs:
      - run-uc-cluster-e2e-tests
      - run-sqlwarehouse-e2e-tests
      - run-cluster-e2e-tests
      - gather-shards
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.pr_numbers != '' &&
      !contains(inputs.pr_numbers, ',')
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post result comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          PR_NUMBER: ${{ inputs.pr_numbers }}
          UC_RESULT: ${{ needs.run-uc-cluster-e2e-tests.result }}
          SQLW_RESULT: ${{ needs.run-sqlwarehouse-e2e-tests.result }}
          CLUSTER_RESULT: ${{ needs.run-cluster-e2e-tests.result }}
          GATHER_RESULT: ${{ needs.gather-shards.result }}
        with:
          script: |
            const ICONS = { success: ':white_check_mark:', skipped: ':fast_forward:' };
            const results = {
              'UC cluster':          process.env.UC_RESULT,
              'SQL warehouse':       process.env.SQLW_RESULT,
              'All-purpose cluster': process.env.CLUSTER_RESULT,
              'Shard coverage':      process.env.GATHER_RESULT,
            };
            const line = Object.entries(results)
              .map(([name, r]) => `${name} ${ICONS[r] || ':x:'} ${r}`)
              .join(' · ');
            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const prNumber = process.env.PR_NUMBER.trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber, 10),
              body: `Integration results for PR #${prNumber} — ${line}\n\n[Run details](${runUrl}).`,
            });
