# Weekly refresh of .github/test_timings.json (weights integration shard balancing).
# Regenerates from recent green runs and opens a human-reviewed PR when timings changed.
name: Refresh Test Timings

on:
  schedule:
    - cron: "0 6 * * 1"   # 06:00 UTC every Monday
  workflow_dispatch:
    inputs:
      num_runs:
        description: "How many distinct-SHA green integration runs to aggregate"
        required: false
        default: "3"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-test-timings
  cancel-in-progress: true

jobs:
  refresh:
    if: github.ref == 'refs/heads/main'
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    env:
      UV_FROZEN: "1"
      GH_TOKEN: ${{ github.token }}
      NUM_RUNS: ${{ github.event.inputs.num_runs || '3' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python Dependencies
        id: deps
        uses: ./.github/actions/setup-python-deps

      - name: Setup JFrog PyPI Proxy (fallback)
        if: steps.deps.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-jfrog-pypi

      - name: Set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "0.11.18"
          cache-local-path: ~/.cache/uv

      - name: Install Hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc  # install
        with:
          version: "1.17.0"

      - name: Regenerate timings
        id: regen
        run: |
          set -euo pipefail
          cp .github/test_timings.json /tmp/test_timings.old.json
          python scripts/regenerate_timings.py \
            --num-runs "$NUM_RUNS" \
            --output .github/test_timings.json \
            --old /tmp/test_timings.old.json \
            --drift-out /tmp/drift.json
          echo "manual_review=$(jq -r '.needs_manual_review' /tmp/drift.json)" >> "$GITHUB_OUTPUT"
          echo "runs_used=$(jq -r '.runs_used' /tmp/drift.json)" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<DRIFT_EOF"
            jq -r '.summary' /tmp/drift.json
            echo "DRIFT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/test_timings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "test_timings.json is unchanged — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A >60% move is likely bad artifacts — warn instead of opening a PR.
      - name: Flag pathological drift
        if: steps.diff.outputs.changed == 'true' && steps.regen.outputs.manual_review == 'true'
        run: |
          echo "::warning::A test file's wall time moved >60% — inspect the regenerated timings before applying. Not auto-opening a PR."
          exit 0

      - name: Open or update refresh PR
        if: steps.diff.outputs.changed == 'true' && steps.regen.outputs.manual_review != 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e  # v7.0.8
        with:
          token: ${{ github.token }}
          branch: auto/refresh-test-timings
          base: main
          add-paths: .github/test_timings.json
          commit-message: "test: refresh test_timings.json"
          title: "test: refresh test_timings.json for shard balancing"
          body: |
            Weekly refresh of `.github/test_timings.json` (median of ${{ steps.regen.outputs.runs_used }} green runs).

            ${{ steps.regen.outputs.summary }}

            Please sanity-check the numbers before merging.
          labels: |
            test-timings
            automated
