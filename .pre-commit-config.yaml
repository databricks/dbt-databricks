repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.2
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies: [types-requests]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock
        args: [--check, --default-index, https://pypi.org/simple]

  - repo: local
    hooks:
      - id: uv-lock-public-urls
        name: uv.lock uses public PyPI URLs
        entry: python3 scripts/check_uv_lock_public_urls.py
        language: system
        pass_filenames: false
        files: ^uv\.lock$
